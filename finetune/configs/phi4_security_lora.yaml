# NISA Fine-tuning Configuration
# Model: Microsoft Phi-4 14B
# Method: LoRA
# Domain: Security + Radar/EW

model: microsoft/phi-4
fine_tune_type: lora
train: true

# Dataset
data: /Users/joshuadavis/NISA/finetune/datasets/combined

# LoRA Parameters
num_layers: 16
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05

# Training Parameters
batch_size: 2
iters: 1000
val_batches: 25
learning_rate: 1e-5
steps_per_report: 10
steps_per_eval: 100
save_every: 100
grad_accumulation_steps: 4
max_seq_length: 4096

# Output
adapter_path: /Users/joshuadavis/NISA/finetune/adapters/phi4_nisa_v1

# Hardware
grad_checkpoint: true
